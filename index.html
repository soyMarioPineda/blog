    <script>
    function intentarModoClaro() {
      const overlay = document.getElementById('hellOverlay');
      const text = document.getElementById('hellText');
      const body = document.body;

      const mensajes = [
        'BUEN INTENTO!',
        'NO FUNCIONARÁ.',
      ];

      let i = 0;
      overlay.classList.add('active');
      body.classList.add('falling');

      const intervalo = setInterval(() => {
        text.classList.add('cambio');
        setTimeout(() => {
          text.textContent = mensajes[i % mensajes.length];
          text.classList.remove('cambio');
          i++;
        }, 150);
      }, 500);

      setTimeout(() => {
        clearInterval(intervalo);
        overlay.classList.add('saliendo');
        body.classList.remove('falling');
        body.classList.add('returning');
        setTimeout(() => {
          overlay.classList.remove('active', 'saliendo');
          body.classList.remove('returning');
          text.textContent = 'NO.';
        }, 800);
      }, 4000);
    }
    </script>
